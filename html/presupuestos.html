<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Productos</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="../favicon_io/site.webmanifest" />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">Game<span>Zone</span></div>
      <nav class="nav-items">
        <a href="../index.html">Inicio</a>
        <a href="../html/productos.html">Productos</a>
        <a href="../html/contacto.html">Contacto</a>
        <a href="../html/presupuestos.html" class="active">Presupuesto</a>
      </nav>
    </header>

    <div class="form-container">
      <h2>Solicita tu Presupuesto</h2>
      <input type="text" placeholder="Nombre" />
      <input type="email" placeholder="Email" />
      <input type="tel" placeholder="Telefono" />
      <textarea placeholder="Mensaje"></textarea>
      <div class="check-container">
        <input type="checkbox" id="privacy" />
        <label for="privacy" class="lbl">Acepto la Politica de Privacidad</label>
      </div>
      <button class="btn">Enviar</button>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <!--Dirección-->
        <div class="footer-info">
          <p>📍 Calle Gamer 123, Sevilla, España</p>
        </div>

        <!--Links legales-->
        <div class="footer-links">
          <a href="../html/aviso_legal.html">Aviso Legal</a>
          <a href="../html/privacidad.html">Política de Privacidad</a>
        </div>

        <!--Redes sociales-->
        <div class="footer-social">
          <a href="https://facebook.com" target="_blank">
            <img src="../images/social/facebook.png" alt="Facebook" />
          </a>

          <a href="https://twitter.com" target="_blank">
            <img src="../images/social/twitter.png" alt="Twitter" />
          </a>

          <a href="https://instagram.com" target="_blank">
            <img src="../images/social/instagram.png" alt="Instagram" />
          </a>
        </div>
      </div>
      <!-- copy -->
      <p class="footer-copy">© 2026 GameZone</p>
    </footer>
  </body>
</html>
