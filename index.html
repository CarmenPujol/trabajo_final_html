<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>GameZone</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">Game<span>Zone</span></div>
      <nav class="nav-items">
        <a href="index.html" class="active">Inicio</a>
        <a href="html/productos.html">Juegos</a>
        <a href="html/contacto.html">Contacto</a>
        <a href="html/presupuestos.html">Presupuesto</a>
      </nav>
    </header>

    <section class="welcome">
      <div class="welcome-text">
        <h1>Bienvenido a <span>GameZone</span></h1>
        <p>Tu mundo de videojuegos y juegos de mesa</p>
        <button class="btn">Ver Juegos</button>
      </div>
      <div class="welcome-overlay"></div>
      <img src="images/welcome.png" alt="Mesa diferentes juegos" />
    </section>

    <section class="categories">
      <div class="category">
        <img src="images/icons/console.png" alt="Videojuegos" />
        <h3>Videojuegos</h3>
      </div>
      <div class="category">
        <img src="images/icons/dice.png" alt="Juegos de Mesa" />
        <h3>Juegos de Mesa</h3>
      </div>
      <div class="category">
        <img src="images/icons/headset.png" alt="Accesorios" />
        <h3>Accesorios</h3>
      </div>
    </section>

    <section class="cards">
      <div class="card">
        <div class="card-img">
          <img src="images/cards/cyberquest.png" alt="Cyber Quest" />
          <div class="overlay"></div>
          <h3>Cyber Quest</h3>
        </div>
      </div>
      <div class="card">
        <div class="card-img">
          <img src="images/cards/kingdomscastles.png" alt="Kingdom and Castles" />
          <div class="overlay"></div>
          <h3>Kingdoms and Castles</h3>
        </div>
      </div>
      <div class="card">
        <div class="card-img">
          <img src="images/cards/headset.png" alt="Gaming Headset" />
          <div class="overlay"></div>
          <h3>Gaming Headset</h3>
        </div>
      </div>
    </section>

    <footer>@ 2026 GameZone</footer>
  </body>
</html>
